side="BOTH"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_loader_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="cloth_config"
mandatory=false
versionRange="[11,)"
ordering="NONE"
side="CLIENT"

