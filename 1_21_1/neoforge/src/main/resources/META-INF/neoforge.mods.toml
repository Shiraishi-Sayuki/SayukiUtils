[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}"
authors="${mod_author}"
description='''${description}'''

[[mixins]]
config="sayukiutils.neoforge.mixins.json"

[[mixins]]
config="sayukiutils.tooltip.mixins.json"

[[mixins]]
config="sayukiutils.lan.mixins.json"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="${neoforge_loader_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="cloth_config"
mandatory=false
versionRange="[15,)"
ordering="NONE"
side="CLIENT"
